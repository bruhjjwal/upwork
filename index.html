<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered e-commerce shopping assistant. Find products, check sizes, compare prices.">
  <title>Shopping Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23000'/><circle cx='50' cy='50' r='20' fill='%23fff'/></svg>">
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="header-logo"></div>
        <span class="header-title">Shopping Assistant</span>
      </div>
      <span class="header-badge">gemini 2.5 flash</span>
    </header>

    <!-- Chat Area -->
    <main class="chat-area" id="chatArea">

      <!-- Welcome Screen -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h2>What are you looking for?</h2>
        <p>Ask me about products, sizes, colors, prices — I'll help you find exactly what you need.</p>
        <div class="suggestions">
          <button class="suggestion-chip">Do you have red shoes under $50?</button>
          <button class="suggestion-chip">What sizes do you have in sneakers?</button>
          <button class="suggestion-chip">Show me women's accessories</button>
          <button class="suggestion-chip">What jackets are available?</button>
        </div>
      </div>

    </main>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="Ask about products..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span>Powered by Gemini 2.5 Flash</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
